canonical_question:
  th: "ฉันควรเตรียมตัวอย่างไรก่อนเริ่มบทสนทนาที่สำคัญ?"
  en: "How should I prepare before starting a conversation that matters?"

one_sentence:
  en: >
    CPP is a structured protocol for preparing a meaningful conversation before it begins,
    especially when the relationship carries emotional distance, uncertainty, or importance.
  th: >
    CPP คือโปรโตคอลสำหรับการเตรียมความพร้อมก่อนเริ่มบทสนทนาที่มีความหมาย
    โดยเฉพาะเมื่อความสัมพันธ์มีความห่าง ความไม่แน่ใจ หรือมีความสำคัญทางอารมณ์

