id: crp
version: "1.0"
status: canonical
category: protocol
created: "2026-06-28"
maintainer: cuqou-ontology-maintainer

label:
  en: Conversation Resolution Protocol
  th: โปรโตคอลการส่งสัญญาณความสัมพันธ์

abbreviation: CRP

grammar_axis:
  modality: asynchronous
  see: knowledge/taxonomy/RELATIONSHIP_GRAMMAR.md

canonical_question:
  en: "When direct conversation is not yet possible or necessary, how can I send a meaningful signal of care?"
  th: "เมื่อยังไม่สามารถหรือยังไม่จำเป็นต้องพูดคุยกันโดยตรง ฉันจะส่งสัญญาณแห่งความใส่ใจอย่างมีความหมายได้อย่างไร?"

one_sentence:
  en: >
    CRP is a structured protocol for expressing meaningful relationship signals through
    asynchronous communication, enabling continuity, care, and connection without
    requiring a live conversation.
  th: >
    CRP คือโปรโตคอลสำหรับการส่งสัญญาณแห่งความสัมพันธ์ที่มีความหมายผ่านการสื่อสารแบบไม่พร้อมกัน
    เพื่อคงไว้ซึ่งความต่อเนื่อง ความใส่ใจ และความเชื่อมโยง โดยไม่จำเป็นต้องเกิดการสนทนาแบบทันที

