canonical_independence: true
canonical_independence_note: >
  CRP is meaningful independent of any product, platform, or technology.
  The concept of sending a meaningful asynchronous signal of care exists
  in handwritten letters, postcards, voice messages, and recorded greetings —
  all predating any digital product. CRP names and structures this pattern.

